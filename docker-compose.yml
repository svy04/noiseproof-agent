services:
  db:
    image: pgvector/pgvector:pg16
    container_name: noiseproof-agent-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-noiseproof}
      POSTGRES_USER: ${POSTGRES_USER:-noiseproof}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-noiseproof}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - noiseproof_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-noiseproof} -d ${POSTGRES_DB:-noiseproof}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  noiseproof_pgdata:
