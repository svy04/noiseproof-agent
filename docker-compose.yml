services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-noiseproof}
      POSTGRES_USER: ${POSTGRES_USER:-noiseproof}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-noiseproof}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - noiseproof_pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-noiseproof} -d ${POSTGRES_DB:-noiseproof}"]
      interval: 10s
      timeout: 5s
      retries: 5

  clamav:
    image: clamav/clamav:stable
    restart: unless-stopped
    profiles:
      - scanner
    expose:
      - "3310"
    volumes:
      - noiseproof_clamav_db:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --ping=1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    profiles:
      - api
    environment:
      DATABASE_URL: postgresql://noiseproof:noiseproof@db:5432/noiseproof
      MAX_RAW_UPLOAD_BYTES: ${MAX_RAW_UPLOAD_BYTES:-1000000}
      NOISEPROOF_SCANNER: ${NOISEPROOF_SCANNER:-unavailable}
      RAW_FILE_SCANNER_TIMEOUT_SECONDS: ${RAW_FILE_SCANNER_TIMEOUT_SECONDS:-30}
      CLAMD_HOST: ${CLAMD_HOST:-clamav}
      CLAMD_PORT: ${CLAMD_PORT:-3310}
      NOISEPROOF_ENABLE_OTEL_SPAN_EXPORT: ${NOISEPROOF_ENABLE_OTEL_SPAN_EXPORT:-false}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  noiseproof_pgdata:
  noiseproof_clamav_db:
