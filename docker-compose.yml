services:
  db:
    image: pgvector/pgvector:pg16
    container_name: noiseproof-agent-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-noiseproof}
      POSTGRES_USER: ${POSTGRES_USER:-noiseproof}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-noiseproof}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - noiseproof_pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-noiseproof} -d ${POSTGRES_DB:-noiseproof}"]
      interval: 10s
      timeout: 5s
      retries: 5

  clamav:
    image: clamav/clamav:stable
    container_name: noiseproof-agent-clamav
    restart: unless-stopped
    profiles:
      - scanner
    expose:
      - "3310"
    volumes:
      - noiseproof_clamav_db:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --ping=1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  noiseproof_pgdata:
  noiseproof_clamav_db:
