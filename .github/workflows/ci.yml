name: CI

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:
    branches: ["main"]

jobs:
  api-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install API dependencies
        working-directory: apps/api
        run: uv sync

      - name: Compile API package
        working-directory: apps/api
        run: uv run python -m compileall app ../../packages/ingestion

      - name: Run API smoke tests
        working-directory: apps/api
        run: uv run pytest -q
