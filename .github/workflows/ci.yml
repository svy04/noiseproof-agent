name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:
    branches: ["main"]

jobs:
  api-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install API dependencies
        working-directory: apps/api
        run: uv sync

      - name: Compile API and local packages
        working-directory: apps/api
        run: uv run python -m compileall app ../../packages/ingestion ../../packages/review

      - name: Check semantic retrieval quality report staleness
        working-directory: apps/api
        run: |
          uv run python -m app.services.semantic_quality_report_command \
            --fixture ../../examples/semantic-retrieval-quality \
            --rankings ../../examples/semantic-retrieval-quality/rankings.json \
            --output ../../docs/evaluation/semantic-retrieval-quality-report.md \
            --k 2 \
            --check

      - name: Check qrels-backed semantic quality report staleness
        working-directory: apps/api
        run: |
          uv run python -m app.services.qrels_backed_semantic_quality_command \
            --qrels ../../examples/semantic-retrieval-quality/qrels.txt \
            --run ../../examples/semantic-retrieval-quality/semantic-run.txt \
            --output ../../docs/evaluation/qrels-backed-semantic-quality-report.md \
            --k 2 \
            --check

      - name: Check live lexical qrels baseline report staleness
        working-directory: apps/api
        run: |
          uv run python -m app.services.live_lexical_qrels_baseline_command \
            --fixture-root ../../examples/semantic-retrieval-quality \
            --output ../../docs/evaluation/live-lexical-qrels-baseline-report.md \
            --strategy fixed-window \
            --k 2 \
            --check

      - name: Check live semantic qrels baseline report staleness
        working-directory: apps/api
        run: |
          uv run python -m app.services.live_semantic_qrels_baseline_command \
            --fixture-root ../../examples/semantic-retrieval-quality \
            --output ../../docs/evaluation/live-semantic-qrels-baseline-report.md \
            --k 2 \
            --check

      - name: Check representative live semantic quality report staleness
        working-directory: apps/api
        run: |
          uv run python -m app.services.representative_live_semantic_quality_command \
            --fixture-root ../../examples/representative-semantic-retrieval-quality \
            --output ../../docs/evaluation/representative-live-semantic-quality-report.md \
            --k 3 \
            --check

      - name: Check PDF extraction quality report staleness
        working-directory: apps/api
        run: |
          uv run python -m app.services.pdf_extraction_quality_report_command \
            --fixture ../../examples/pdf-extraction-quality \
            --observations ../../examples/pdf-extraction-quality/observations.json \
            --output ../../docs/evaluation/pdf-extraction-quality-report.md \
            --check

      - name: Check multi-fixture PDF extraction quality report staleness
        working-directory: apps/api
        run: |
          uv run python -m app.services.multi_fixture_pdf_extraction_quality_command \
            --fixture ../../examples/pdf-extraction-quality \
            --observations ../../examples/pdf-extraction-quality/observations.json \
            --output ../../docs/evaluation/multi-fixture-pdf-extraction-quality-report.md \
            --check

      - name: Check missing PDF runtime observation pack report staleness
        working-directory: apps/api
        run: |
          uv run python -m app.services.missing_pdf_runtime_observation_pack_command \
            --fixture ../../examples/pdf-extraction-quality \
            --base-observations ../../examples/pdf-extraction-quality/observations.json \
            --pack ../../examples/pdf-extraction-quality/missing-runtime-observations.json \
            --output ../../docs/evaluation/missing-pdf-runtime-observation-pack-report.md \
            --check

      - name: Check OCR layout image fixture adapter runtime pack report staleness
        working-directory: apps/api
        run: |
          uv run python -m app.services.ocr_layout_image_fixture_adapter_runtime_pack_command \
            --fixture ../../examples/pdf-extraction-quality \
            --output ../../docs/evaluation/ocr-layout-image-fixture-adapter-runtime-pack-report.md \
            --check

      - name: Check committed OCR layout image binary fixture provenance report staleness
        working-directory: apps/api
        run: |
          uv run python -m app.services.committed_ocr_layout_image_binary_fixture_provenance_command \
            --fixture-root ../../examples/pdf-extraction-quality/binary-fixtures \
            --output ../../docs/evaluation/committed-ocr-layout-image-binary-fixture-provenance-report.md \
            --check

      - name: Check multi-fixture OCR adapter eval report staleness
        working-directory: apps/api
        run: |
          uv run python -m app.services.multi_fixture_ocr_adapter_eval_command \
            --fixture ../../examples/pdf-extraction-quality \
            --base-observations ../../examples/pdf-extraction-quality/observations.json \
            --missing-pack ../../examples/pdf-extraction-quality/missing-runtime-observations.json \
            --owner-ocr-observation ../../examples/pdf-extraction-quality/owner-runtime-ocr-smoke-observation.json \
            --output ../../docs/evaluation/multi-fixture-ocr-adapter-eval-report.md \
            --check

      - name: Check opt-in OCR adapter runtime input discovery missing state
        working-directory: apps/api
        run: |
          uv run python -m app.services.opt_in_ocr_adapter_runtime_smoke_command \
            --discover-owner-runtime-input > opt-in-ocr-runtime-input-discovery.json
          cat opt-in-ocr-runtime-input-discovery.json
          python - opt-in-ocr-runtime-input-discovery.json <<'PY'
          import json
          import sys

          payload = json.load(open(sys.argv[1], encoding="utf-8"))
          assert payload["phase_marker"] == "opt-in OCR adapter owner-runtime input discovery v0"
          assert payload["owner_runtime_input_status"] == "missing_tessdata_prefix"
          assert payload["opt_in_enabled"] is False
          assert payload["tessdata_prefix_present"] is False
          assert payload["tessdata_path_printed"] is False
          assert payload["tessdata_path_committed_to_repo"] is False
          assert payload["ocr_calls_attempted"] is False
          assert payload["api_calls_attempted"] is False
          assert payload["non_claims"]["ocr_evidence"] is False
          PY
          rm opt-in-ocr-runtime-input-discovery.json

      - name: Check ClamAV owner runtime input discovery no-payload missing state
        working-directory: apps/api
        run: |
          set +e
          uv run python -m app.services.clamav_api_malicious_detection_harness \
            --discover-owner-runtime-input > owner-runtime-input-discovery.json
          status=$?
          set -e
          cat owner-runtime-input-discovery.json
          test "$status" -eq 4
          python - owner-runtime-input-discovery.json <<'PY'
          import json
          import sys

          payload = json.load(open(sys.argv[1], encoding="utf-8"))
          assert payload["discovery_status"] == "owner_runtime_input_missing"
          assert payload["api_calls_attempted"] is False
          assert payload["input_payload_inspected"] is False
          assert payload["malicious_detection_verified"] is False
          assert payload["payload_committed_to_repo"] is False
          assert payload["raw_payload_logged"] is False
          assert payload["required_owner_input_missing"] is True
          assert payload["discoverable_input_sources"] == ["file", "stdin", "environment"]
          assert payload["accepted_input_sources"] == ["file", "stdin"]
          assert payload["candidates"]["signature_text_env"]["validator_accepted"] is False
          assert payload["candidates"]["stdin"]["validator_accepted"] is True
          PY
          rm owner-runtime-input-discovery.json

      - name: Check embedding provider owner runtime input discovery missing state
        working-directory: apps/api
        run: |
          uv run python -m app.services.embedding_model_live_provider_harness \
            --discover-owner-runtime-input > embedding-provider-input-discovery.json
          cat embedding-provider-input-discovery.json
          python - embedding-provider-input-discovery.json <<'PY'
          import json
          import sys

          payload = json.load(open(sys.argv[1], encoding="utf-8"))
          assert payload["phase_marker"] == "embedding model live-provider owner-runtime input discovery v0"
          assert payload["owner_runtime_input_status"] == "missing_openai_api_key"
          assert payload["openai_api_key_present"] is False
          assert payload["openai_api_key_printed"] is False
          assert payload["opt_in_enabled"] is False
          assert payload["api_calls_attempted"] is False
          assert payload["secret_logged"] is False
          assert payload["secret_committed_to_repo"] is False
          assert payload["non_claims"]["live_embedding_generation_proof"] is False
          PY
          rm embedding-provider-input-discovery.json

      - name: Check live embedding domain qrels owner-runtime input discovery
        working-directory: apps/api
        run: |
          uv run python -m app.services.live_embedding_domain_qrels_harness \
            --discover-owner-runtime-input > live-embedding-domain-qrels-input-discovery.json
          cat live-embedding-domain-qrels-input-discovery.json
          python - live-embedding-domain-qrels-input-discovery.json <<'PY'
          import json
          import sys

          payload = json.load(open(sys.argv[1], encoding="utf-8"))
          assert payload["phase_marker"] == "live embedding-backed domain qrels owner-runtime input discovery v0"
          assert payload["owner_runtime_input_status"] == "missing_openai_api_key"
          assert payload["openai_api_key_present"] is False
          assert payload["openai_api_key_printed"] is False
          assert payload["opt_in_enabled"] is False
          assert payload["api_calls_attempted"] is False
          assert payload["secret_logged"] is False
          assert payload["secret_committed_to_repo"] is False
          assert payload["non_claims"]["live_embedding_generation_proof"] is False
          assert payload["non_claims"]["production_semantic_quality"] is False
          PY
          rm live-embedding-domain-qrels-input-discovery.json

      - name: Check live embedding domain qrels owner-runtime runner missing input
        working-directory: apps/api
        run: |
          set +e
          uv run python -m app.services.live_embedding_domain_qrels_harness \
            --run-owner-runtime-eval \
            --output /tmp/noiseproof-owner-runtime-domain-qrels-report.json \
            > live-embedding-domain-qrels-runner-missing-input.json
          status=$?
          set -e
          cat live-embedding-domain-qrels-runner-missing-input.json
          test "$status" -eq 4
          test ! -f /tmp/noiseproof-owner-runtime-domain-qrels-report.json
          python - live-embedding-domain-qrels-runner-missing-input.json <<'PY'
          import json
          import sys

          payload = json.load(open(sys.argv[1], encoding="utf-8"))
          assert payload["phase_marker"] == "live embedding-backed domain qrels owner-runtime runner v0"
          assert payload["run_status"] == "input_not_ready"
          assert payload["owner_runtime_input_status"] == "missing_openai_api_key"
          assert payload["api_calls_attempted"] is False
          assert payload["openai_api_key_printed"] is False
          assert payload["secret_logged"] is False
          assert payload["secret_committed_to_repo"] is False
          assert payload["non_claims"]["live_embedding_generation_proof"] is False
          assert payload["non_claims"]["production_semantic_quality"] is False
          PY
          rm live-embedding-domain-qrels-runner-missing-input.json

      - name: Run API smoke tests
        working-directory: apps/api
        run: uv run pytest -q
